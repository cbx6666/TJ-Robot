# Coverage-patrol tuned overrides.

controller_server:
  ros__parameters:
    controller_frequency: 15.0

    progress_checker:
      required_movement_radius: 0.35
      movement_time_allowance: 10.0

    goal_checker:
      xy_goal_tolerance: 0.35
      yaw_goal_tolerance: 1.2

    FollowPath:
      max_vel_x: 0.56
      min_vel_theta: -2.0
      max_vel_theta: 2.0
      acc_lim_x: 2.4
      acc_lim_theta: 4.8
      decel_lim_x: -2.4
      decel_lim_theta: -4.8
      xy_goal_tolerance: 0.35
      PathAlign.scale: 14.0
      GoalAlign.scale: 10.0
      PathDist.scale: 28.0
      GoalDist.scale: 18.0
      Oscillation.scale: 28.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 5.0
      width: 6
      height: 6

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 4.0
      width: 12
      height: 12
